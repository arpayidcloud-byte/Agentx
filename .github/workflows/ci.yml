name: CI
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 11.13.0
      # Update: using proper version matching local
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm lint:deps
      - name: Clean build artifacts
        run: |
          find . -name "dist" -type d -not -path "*/node_modules/*" -exec rm -rf {} + 2>/dev/null
          find . -name ".turbo" -type d -not -path "*/node_modules/*" -exec rm -rf {} + 2>/dev/null
          find . -name "*.tsbuildinfo" -not -path "*/node_modules/*" -delete 2>/dev/null
          echo "cleaned"
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test:coverage
      - name: Coverage threshold check
        run: |
          THRESHOLD=80
          COVERAGE_FILES=$(find packages -name "coverage-final.json" -path "*/coverage/*" 2>/dev/null)
          if [ -z "$COVERAGE_FILES" ]; then
            echo "⚠️ No coverage files found, skipping threshold check"
            exit 0
          fi
          COVERAGE=$(echo "$COVERAGE_FILES" | xargs -I {} jq '.total.lines.pct' {} 2>/dev/null | awk '{s+=$1; n++} END {if(n>0) print s/n; else print 0}')
          if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "0" ]; then
            echo "⚠️ Could not parse coverage data, skipping threshold check"
            exit 0
          fi
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets threshold $THRESHOLD%"
      - name: Setup handbook for lint & contract tests
        id: handbook-setup
        env:
          HANDBOOK_TOKEN: ${{ secrets.HANDBOOK_TOKEN }}
        run: |
          if [ -n "$HANDBOOK_TOKEN" ]; then
            git clone --depth 1 https://x-access-token:${HANDBOOK_TOKEN}@github.com/arpayidcloud-byte/agentx-handbook.git /tmp/agentx-handbook
          else
            git clone --depth 1 https://github.com/arpayidcloud-byte/agentx-handbook.git /tmp/agentx-handbook
          fi
      - name: Handbook lint
        if: steps.handbook-setup.conclusion == 'success'
        run: pnpm lint:handbook
        env:
          HANDBOOK_DIR: /tmp/agentx-handbook
      - name: Contract tests (handbook validation)
        if: steps.handbook-setup.conclusion == 'success'
        env:
          HANDBOOK_DIR: /tmp/agentx-handbook
        run: |
          cd /tmp/agentx-handbook
          npm install --save-dev vitest 2>/dev/null
          npx vitest run --reporter=verbose 08-Examples/
