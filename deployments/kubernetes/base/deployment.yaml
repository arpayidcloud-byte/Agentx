apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentx-api
  labels:
    app: agentx
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentx
      component: api
  template:
    metadata:
      labels:
        app: agentx
        component: api
    spec:
      containers:
        - name: agentx-api
          image: ghcr.io/arpayidcloud-byte/agentx:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentx-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agentx-secrets
                  key: redis-url
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
